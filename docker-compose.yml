version: '3.4'

services:
  one-api:
    image: "${REGISTRY:-docker.io}/justsong/one-api:latest"
    container_name: one-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data/oneapi:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=oneapi:123456@tcp(db:3306)/one-api  # 修改此行，或注释掉以使用 SQLite 作为数据库
      - REDIS_CONN_STRING=redis://redis
      - SYNC_FREQUENCY=60  # 必须设置，否则 Redis 不会启用（订阅窗口计数依赖 Redis）
      - MEMORY_CACHE_ENABLED=true  # 启用内存缓存，加速渠道分发
      - SESSION_SECRET=${SESSION_SECRET:-random_string}  # 修改为随机字符串
      - BATCH_UPDATE_ENABLED=true  # 启用批量更新，减少数据库压力
      - BATCH_UPDATE_INTERVAL=5
      - TZ=Asia/Shanghai
#      - NODE_TYPE=slave  # 多机部署时从节点取消注释该行
#      - FRONTEND_BASE_URL=https://openai.justsong.cn  # 多机部署时从节点取消注释该行
#      - INITIAL_ROOT_TOKEN=  # 首次启动时设置 root 用户 API token
#      - INITIAL_ROOT_ACCESS_TOKEN=  # 首次启动时设置 root 用户 access token
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' | awk -F: '{print $2}'" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: "${REGISTRY:-docker.io}/redis:7-alpine"
    container_name: redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: "${REGISTRY:-docker.io}/mysql:8.2.0"
    restart: always
    container_name: mysql
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - '127.0.0.1:3306:3306'
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-OneAPI@justsong}'
      MYSQL_USER: '${MYSQL_USER:-oneapi}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:-123456}'
      MYSQL_DATABASE: '${MYSQL_DATABASE:-one-api}'
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
